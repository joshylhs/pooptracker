  .pct { width: 28px; font-size: 11px; text-align: right; flex-shrink: 0; color: rgba(255,255,255,0.5); }
  .footnote { font-size: 10px; color: #5a5350; margin-top: 6px; }
  svg { display: block; shape-rendering: crispEdges; image-rendering: pixelated; }
</style>

    sh  = #2E1A08  shadow
    tx  = #3A2210  texture (crosshatch dots)

  ALL types have a dense crosshatch/stipple texture filling the whole shape.
  The texture is rendered as alternating dark dots on a lighter base.
-->
